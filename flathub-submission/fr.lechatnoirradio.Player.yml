# Manifeste de SOUMISSION Flathub — Le Chat Noir Radio.
# Ce fichier + cargo-sources.json constituent la PR sur github.com/flathub/flathub
# (branche nommée fr.lechatnoirradio.Player). Build 100 % hors-ligne (crates vendorées).
app-id: fr.lechatnoirradio.Player
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: lechatnoir-player

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --socket=pulseaudio
  # Réseau requis au RUNTIME : flux Icecast + JSON éditoriaux (grille, voix, actus).
  - --share=network

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/lechatnoir/cargo

modules:
  - name: lechatnoir
    buildsystem: simple
    build-commands:
      # Neutralise un éventuel rust-toolchain.toml (sinon rustup tenterait un téléchargement, interdit hors-ligne).
      - rm -f rust-toolchain.toml
      - cargo --offline build --release
      - install -Dm755 target/release/lechatnoir-player /app/bin/lechatnoir-player
      - install -Dm644 data/fr.lechatnoirradio.Player.desktop
        /app/share/applications/fr.lechatnoirradio.Player.desktop
      - install -Dm644 data/fr.lechatnoirradio.Player.metainfo.xml
        /app/share/metainfo/fr.lechatnoirradio.Player.metainfo.xml
      - install -Dm644 data/fr.lechatnoirradio.Player.gschema.xml
        /app/share/glib-2.0/schemas/fr.lechatnoirradio.Player.gschema.xml
      - for s in 48 64 128 256 512; do install -Dm644
        "data/icons/hicolor/${s}x${s}/apps/fr.lechatnoirradio.Player.png"
        "/app/share/icons/hicolor/${s}x${s}/apps/fr.lechatnoirradio.Player.png"; done
      - glib-compile-schemas /app/share/glib-2.0/schemas
    sources:
      - type: git
        url: https://github.com/Dr-John-8bits/lechatnoir-linux.git
        tag: v26.6.20
        commit: 037133d8174e70a5d82b6ebbaef379e235cdb42b
      - cargo-sources.json
